<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline | Staffify Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" type="image/svg+xml" href="/assets/brand/icon.svg">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --c: #1abde1;
            --bg: #0a0a0a;
            --panel: #131313;
            --panel2: #1a1a1a;
            --border: rgba(255,255,255,0.08);
            --text: #f5f5f7;
            --subtle: #8a8a8f;
            --muted: #a1a1a6;
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --indigo: #6366f1;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg); color: var(--text);
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        a { color: inherit; }

        /* ─── Header ─── */
        header.page {
            position: sticky; top: 0; z-index: 50;
            padding: 16px 28px;
            display: flex; align-items: center; justify-content: space-between;
            background: rgba(10,10,10,0.85);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .brand {
            display: flex; align-items: center; gap: 14px;
        }
        .brand-logo {
            width: 30px; height: 30px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1abde1, #1456a4);
            display: flex; align-items: center; justify-content: center;
            font-weight: 900; color: #fff;
            font-size: 14px; letter-spacing: -0.04em;
        }
        .brand-title {
            font-weight: 800; letter-spacing: -0.02em; font-size: 16px;
        }
        .brand-sub { font-size: 12px; color: var(--subtle); margin-top: 1px; }
        .header-actions { display: flex; gap: 10px; align-items: center; }
        .header-btn {
            background: var(--panel2); color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 14px; border-radius: 8px;
            font-size: 13px; font-weight: 500; cursor: pointer;
            transition: background .12s, border-color .12s;
        }
        .header-btn:hover { background: #222; border-color: rgba(255,255,255,0.18); }

        /* ─── Login screen ─── */
        .login-screen {
            min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px;
        }
        .login-card {
            background: var(--panel); border: 1px solid var(--border);
            border-radius: 16px; padding: 36px 32px;
            width: 100%; max-width: 380px;
        }
        .login-card h1 { font-size: 22px; font-weight: 800; letter-spacing: -0.02em; margin-bottom: 6px; }
        .login-card p { font-size: 13px; color: var(--muted); margin-bottom: 22px; }
        .login-card input {
            width: 100%;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--border);
            padding: 12px 14px; border-radius: 10px;
            font-size: 14px; font-family: inherit;
            margin-bottom: 14px;
        }
        .login-card input:focus { outline: none; border-color: var(--c); }
        .login-card button {
            width: 100%;
            background: var(--c); color: #000;
            font-weight: 700; font-size: 14px;
            border: none; padding: 12px 14px; border-radius: 10px;
            cursor: pointer; transition: filter .12s;
            font-family: inherit;
        }
        .login-card button:hover { filter: brightness(1.1); }
        .login-error { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 16px; }

        /* ─── Tabs ─── */
        .tabs {
            display: flex; padding: 0 28px;
            border-bottom: 1px solid var(--border);
            background: var(--bg);
            gap: 4px;
            overflow-x: auto;
        }
        .tab {
            background: none; border: none;
            color: var(--subtle);
            padding: 14px 18px;
            font-size: 14px; font-weight: 600;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            display: flex; align-items: center; gap: 8px;
            font-family: inherit;
            transition: color .12s;
            white-space: nowrap;
        }
        .tab:hover { color: var(--text); }
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--c);
        }
        .tab .count {
            background: var(--panel2);
            color: var(--muted);
            font-size: 11px; font-weight: 700;
            padding: 2px 7px; border-radius: 10px;
            min-width: 22px; text-align: center;
        }
        .tab.active .count { background: var(--c); color: #000; }

        /* ─── Content area ─── */
        main { padding: 24px 28px 80px; }
        .empty {
            border: 1px dashed var(--border);
            border-radius: 12px;
            padding: 60px 24px;
            text-align: center;
            color: var(--subtle);
            font-size: 14px;
        }
        .empty strong { color: var(--text); font-weight: 700; }
        .loading { text-align: center; color: var(--subtle); padding: 40px; font-size: 13px; }

        /* ─── Prospect cards ─── */
        .prospects { display: flex; flex-direction: column; gap: 10px; }
        .prospect {
            background: var(--panel);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 18px 20px;
            display: grid;
            grid-template-columns: 1fr auto;
            gap: 16px;
            align-items: center;
            transition: border-color .12s;
        }
        .prospect:hover { border-color: rgba(255,255,255,0.18); }
        .p-main { min-width: 0; }
        .p-name {
            font-weight: 700; font-size: 15px;
            margin-bottom: 3px;
        }
        .p-meta {
            display: flex; flex-wrap: wrap; gap: 10px 18px;
            font-size: 13px; color: var(--muted);
            align-items: center;
        }
        .p-meta a { color: var(--muted); text-decoration: none; }
        .p-meta a:hover { color: var(--c); }
        .role-pill {
            display: inline-block;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            padding: 3px 8px; border-radius: 6px;
        }
        .role-editors    { background: rgba(99,102,241,0.12); color: #a5b4fc; }
        .role-admins     { background: rgba(34,197,94,0.12); color: #86efac; }
        .role-csr        { background: rgba(245,158,11,0.14); color: #fcd34d; }
        .role-sales      { background: rgba(26,189,225,0.12); color: #67e8f9; }
        .role-default    { background: rgba(161,161,166,0.14); color: var(--muted); }
        .status-pill {
            display: inline-block;
            font-size: 11px; font-weight: 700;
            letter-spacing: 0.04em;
            padding: 3px 9px; border-radius: 6px;
        }
        .status-upcoming { background: rgba(99,102,241,0.14); color: #a5b4fc; }
        .status-client-pending-payment { background: rgba(245,158,11,0.14); color: #fcd34d; }
        .status-client-active { background: rgba(34,197,94,0.14); color: #86efac; }
        .status-no-close { background: rgba(161,161,166,0.14); color: var(--muted); }

        .p-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        .act {
            background: var(--panel2); color: var(--text);
            border: 1px solid var(--border);
            padding: 7px 12px; border-radius: 8px;
            font-size: 12px; font-weight: 600; cursor: pointer;
            transition: background .12s, border-color .12s, color .12s;
            font-family: inherit;
            white-space: nowrap;
        }
        .act:hover { background: #222; border-color: rgba(255,255,255,0.18); }
        .act.primary {
            background: var(--c); color: #000; border-color: var(--c);
        }
        .act.primary:hover { filter: brightness(1.05); background: var(--c); }
        .act.success {
            background: rgba(34,197,94,0.14); color: #86efac; border-color: rgba(34,197,94,0.3);
        }
        .act.danger {
            background: rgba(239,68,68,0.1); color: #fca5a5; border-color: rgba(239,68,68,0.25);
        }
        .act:disabled { opacity: 0.5; cursor: not-allowed; }

        .note-toggle {
            background: none; border: none; color: var(--subtle);
            font-size: 12px; cursor: pointer; padding: 0; margin-top: 4px;
            display: inline-flex; align-items: center; gap: 4px;
        }
        .note-toggle:hover { color: var(--text); }
        .note-area {
            margin-top: 12px;
            display: none;
        }
        .note-area.open { display: block; }
        .note-area textarea {
            width: 100%; min-height: 70px;
            background: var(--bg); color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px; padding: 10px 12px;
            font-family: inherit; font-size: 13px; line-height: 1.5;
            resize: vertical;
        }
        .note-area textarea:focus { outline: none; border-color: var(--c); }
        .note-meta { font-size: 11px; color: var(--subtle); margin-top: 6px; }

        /* ─── Toast ─── */
        .toast {
            position: fixed; bottom: 24px; right: 24px;
            background: var(--panel); border: 1px solid var(--border);
            border-left: 3px solid var(--c);
            padding: 12px 16px; border-radius: 10px;
            font-size: 13px;
            box-shadow: 0 12px 36px rgba(0,0,0,0.5);
            opacity: 0; transform: translateY(20px);
            transition: opacity .25s, transform .25s;
            z-index: 100;
        }
        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.error { border-left-color: var(--red); }

        @media (max-width: 720px) {
            header.page { padding: 14px 16px; }
            .tabs { padding: 0 16px; }
            main { padding: 16px; }
            .prospect { grid-template-columns: 1fr; }
            .p-actions { justify-content: flex-start; }
        }
    </style>
</head>
<body>

<!-- ─── Login (shown until token is in localStorage and verified) ─── -->
<section id="loginView" class="login-screen" style="display:none;">
    <form id="loginForm" class="login-card" onsubmit="return loginSubmit(event)">
        <h1>Pipeline</h1>
        <p>Enter your admin token to continue.</p>
        <input type="password" id="tokenInput" placeholder="ADMIN_TOKEN" autocomplete="off" required>
        <button type="submit">Sign in</button>
        <div class="login-error" id="loginError"></div>
    </form>
</section>

<!-- ─── Dashboard ─── -->
<div id="dashboardView" style="display:none;">
    <header class="page">
        <div class="brand">
            <div class="brand-logo">S</div>
            <div>
                <div class="brand-title">Pipeline</div>
                <div class="brand-sub">Discovery → Client → Onboarded</div>
            </div>
        </div>
        <div class="header-actions">
            <button class="header-btn" onclick="refreshCurrent()">Refresh</button>
            <button class="header-btn" onclick="logout()">Sign out</button>
        </div>
    </header>

    <nav class="tabs" id="tabs">
        <button class="tab active" data-status="upcoming">Upcoming <span class="count" id="count-upcoming">–</span></button>
        <button class="tab" data-status="client-pending-payment">Pending Payment <span class="count" id="count-client-pending-payment">–</span></button>
        <button class="tab" data-status="client-active">Active Clients <span class="count" id="count-client-active">–</span></button>
        <button class="tab" data-status="no-close">No Close <span class="count" id="count-no-close">–</span></button>
    </nav>

    <main>
        <div id="content" class="loading">Loading…</div>
    </main>
</div>

<div id="toast" class="toast"></div>

<script>
'use strict';

const TOKEN_KEY = 'sf_admin_token_v1';
let currentStatus = 'upcoming';

// ─── Auth ───────────────────────────────────────────────────────
function getToken() { return localStorage.getItem(TOKEN_KEY) || ''; }
function setToken(t) { localStorage.setItem(TOKEN_KEY, t); }
function clearToken() { localStorage.removeItem(TOKEN_KEY); }

function showLogin() {
    document.getElementById('loginView').style.display = 'flex';
    document.getElementById('dashboardView').style.display = 'none';
}
function showDashboard() {
    document.getElementById('loginView').style.display = 'none';
    document.getElementById('dashboardView').style.display = 'block';
}

async function loginSubmit(e) {
    e.preventDefault();
    const t = document.getElementById('tokenInput').value.trim();
    const errBox = document.getElementById('loginError');
    errBox.textContent = '';
    if (!t) return;
    // Probe with a list call
    try {
        const r = await fetch('/api/pipeline/?status=upcoming', {
            headers: { 'Authorization': 'Bearer ' + t },
        });
        if (r.status === 401) { errBox.textContent = 'Invalid token.'; return false; }
        if (!r.ok) { errBox.textContent = 'Error: HTTP ' + r.status; return false; }
        setToken(t);
        showDashboard();
        await loadStatus('upcoming');
    } catch (err) {
        errBox.textContent = 'Network error.';
    }
    return false;
}

function logout() {
    clearToken();
    showLogin();
    document.getElementById('tokenInput').value = '';
}

// ─── API helpers ────────────────────────────────────────────────
async function api(path, opts = {}) {
    const t = getToken();
    if (!t) { showLogin(); throw new Error('no_token'); }
    const r = await fetch(path, {
        ...opts,
        headers: {
            'Authorization': 'Bearer ' + t,
            'Content-Type': 'application/json',
            ...(opts.headers || {}),
        },
    });
    if (r.status === 401) { logout(); throw new Error('unauthorized'); }
    const j = await r.json().catch(() => ({}));
    if (!r.ok) throw new Error(j.error || ('http_' + r.status));
    return j;
}

// ─── Rendering ──────────────────────────────────────────────────
function fmtDate(ts) {
    if (!ts) return '—';
    const d = new Date(typeof ts === 'string' && !/^\d+$/.test(ts) ? ts : Number(ts));
    if (isNaN(d.getTime())) return '—';
    return d.toLocaleString(undefined, { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit' });
}
function timeAgo(ts) {
    if (!ts) return '';
    const seconds = Math.max(0, (Date.now() - Number(ts)) / 1000);
    if (seconds < 60) return 'just now';
    if (seconds < 3600) return Math.floor(seconds / 60) + 'm ago';
    if (seconds < 86400) return Math.floor(seconds / 3600) + 'h ago';
    return Math.floor(seconds / 86400) + 'd ago';
}
function roleClass(role) {
    return 'role-pill role-' + (role || 'default');
}
function statusClass(s) {
    return 'status-pill status-' + (s || 'upcoming');
}
function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
}

function updateCounts(counts) {
    if (!counts) return;
    for (const s of Object.keys(counts)) {
        const el = document.getElementById('count-' + s);
        if (el) el.textContent = counts[s];
    }
}

function renderProspect(p, currentStatus) {
    const role = p.role || 'default';
    const status = p.status || 'upcoming';
    const company = p.company ? '· ' + escapeHtml(p.company) : '';

    let timeLabel = '';
    if (status === 'upcoming' && p.next_call_at) {
        timeLabel = `Call: <strong style="color:#fff">${escapeHtml(fmtDate(p.next_call_at))}</strong>`;
    } else if (status === 'client-pending-payment') {
        timeLabel = `Marked client ${escapeHtml(timeAgo(p.status_updated_at))}`;
    } else if (status === 'client-active') {
        timeLabel = `Paid ${escapeHtml(timeAgo(p.paid_at || p.status_updated_at))}`;
    } else if (status === 'no-close') {
        timeLabel = `Closed ${escapeHtml(timeAgo(p.status_updated_at))}`;
    }

    let actions = '';
    if (status === 'upcoming') {
        actions = `
            <button class="act primary" onclick="doAction('${escapeHtml(p.email)}','mark-client')">Mark as Client →</button>
            <button class="act danger" onclick="doAction('${escapeHtml(p.email)}','mark-no-close')">No Close</button>
        `;
    } else if (status === 'client-pending-payment') {
        actions = `
            <button class="act success" onclick="doAction('${escapeHtml(p.email)}','mark-paid')">Mark Paid →</button>
            <button class="act" onclick="doAction('${escapeHtml(p.email)}','reopen')">Reopen</button>
        `;
    } else if (status === 'client-active') {
        actions = `<button class="act" onclick="doAction('${escapeHtml(p.email)}','reopen')">Reopen</button>`;
    } else if (status === 'no-close') {
        actions = `<button class="act" onclick="doAction('${escapeHtml(p.email)}','reopen')">Reopen</button>`;
    }

    const noteValue = p.notes ? escapeHtml(p.notes) : '';
    const noteCount = p.notes ? p.notes.length : 0;
    return `
        <div class="prospect" data-email="${escapeHtml(p.email)}">
            <div class="p-main">
                <div class="p-name">${escapeHtml(p.first_name || p.email.split('@')[0])}
                    <span class="${statusClass(status)}" style="margin-left:8px;">${escapeHtml(status)}</span>
                </div>
                <div class="p-meta">
                    <a href="mailto:${escapeHtml(p.email)}">${escapeHtml(p.email)}</a>
                    <span class="${roleClass(role)}">${escapeHtml(role)}</span>
                    <span>${timeLabel}</span>
                    ${company}
                </div>
                <button class="note-toggle" onclick="toggleNotes(this)">📝 Notes${noteCount ? ' ('+noteCount+')' : ''}</button>
                <div class="note-area">
                    <textarea placeholder="Internal notes — what they said, follow-ups, etc.">${noteValue}</textarea>
                    <div class="note-meta">
                        <button class="act" style="margin-top:6px;" onclick="saveNotes(this,'${escapeHtml(p.email)}')">Save notes</button>
                        ${p.notes_updated_at ? '<span style="margin-left:10px;">Last updated ' + escapeHtml(timeAgo(p.notes_updated_at)) + '</span>' : ''}
                    </div>
                </div>
            </div>
            <div class="p-actions">${actions}</div>
        </div>
    `;
}

async function loadStatus(status) {
    currentStatus = status;
    // Update tab UI
    document.querySelectorAll('.tab').forEach(t => {
        t.classList.toggle('active', t.dataset.status === status);
    });
    const content = document.getElementById('content');
    content.className = 'loading';
    content.textContent = 'Loading…';
    try {
        const data = await api('/api/pipeline/?status=' + encodeURIComponent(status));
        updateCounts(data.counts);
        if (!data.prospects.length) {
            content.className = 'empty';
            content.innerHTML = `<strong>No one in ${status} right now.</strong><br>New bookings auto-populate the Upcoming tab.`;
            return;
        }
        content.className = 'prospects';
        content.innerHTML = data.prospects.map(p => renderProspect(p, status)).join('');
    } catch (err) {
        content.className = 'empty';
        content.innerHTML = `<strong>Error loading.</strong><br>${escapeHtml(err.message)}`;
    }
}

function toggleNotes(btn) {
    const area = btn.nextElementSibling;
    area.classList.toggle('open');
}

async function doAction(email, action) {
    const labels = {
        'mark-client': 'Move to Pending Payment?',
        'mark-paid': 'Mark this client as paid? This sends them the intake form + strategy call link.',
        'mark-no-close': 'Mark as No Close? They\\'ll be enrolled in the email nurture drip.',
        'reopen': 'Move back to Upcoming?',
    };
    if (!confirm(labels[action] || 'Confirm action?')) return;
    try {
        const j = await api('/api/pipeline-action/', {
            method: 'POST',
            body: JSON.stringify({ email, action }),
        });
        let msg = 'Done.';
        if (action === 'mark-paid' && j.onboarding_email_sent) msg = 'Marked paid. Intake + strategy email sent.';
        if (action === 'mark-no-close') msg = 'Marked no close. Nurture sequence enrolled.';
        if (action === 'mark-client') msg = 'Marked as client. Waiting on QB payment.';
        toast(msg);
        await loadStatus(currentStatus);
    } catch (err) {
        toast('Error: ' + err.message, true);
    }
}

async function saveNotes(btn, email) {
    const area = btn.closest('.note-area');
    const notes = area.querySelector('textarea').value;
    try {
        await api('/api/pipeline-action/', {
            method: 'POST',
            body: JSON.stringify({ email, action: 'save-notes', notes }),
        });
        toast('Notes saved.');
    } catch (err) {
        toast('Error: ' + err.message, true);
    }
}

function refreshCurrent() { loadStatus(currentStatus); }

function toast(msg, isError) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.toggle('error', !!isError);
    el.classList.add('show');
    clearTimeout(toast._t);
    toast._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ─── Boot ───────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(t => {
    t.addEventListener('click', () => loadStatus(t.dataset.status));
});

(async function boot() {
    if (!getToken()) { showLogin(); return; }
    showDashboard();
    await loadStatus('upcoming');
})();
</script>

</body>
</html>
